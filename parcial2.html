<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historia de las Instituciones Jurídicas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1208;
      --paper: #fdf8f0;
      --parchment: #f5edd8;
      --gold: #b8860b;
      --gold-light: #d4a843;
      --gold-muted: rgba(184,134,11,0.18);
      --rust: #8b3a0f;
      --rust-light: #c04a18;
      --teal: #1a6b6b;
      --shadow-warm: rgba(26,18,8,0.18);
      --border-warm: rgba(184,134,11,0.35);
      --serif: 'Source Serif 4', Georgia, serif;
      --display: 'Playfair Display', Georgia, serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--serif);
      background: #2a1f0e;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(184,134,11,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(139,58,15,0.1) 0%, transparent 50%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 60px;
      color: var(--ink);
    }

    /* ====== HEADER ====== */
    .app-header {
      width: 100%;
      max-width: 1080px;
      text-align: center;
      margin-bottom: 28px;
      animation: fadeDown 0.6s ease-out;
    }

    .header-eyebrow {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .header-title {
      font-family: var(--display);
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 700;
      color: var(--paper);
      line-height: 1.15;
      letter-spacing: -0.01em;
      text-shadow: 0 2px 20px rgba(0,0,0,0.4);
      margin-bottom: 6px;
    }

    .header-sub {
      font-size: 0.88rem;
      color: rgba(253,248,240,0.55);
      font-weight: 300;
      font-style: italic;
    }

    .header-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 14px 0;
      color: var(--gold);
      opacity: 0.7;
      font-size: 0.85rem;
    }
    .header-ornament::before, .header-ornament::after {
      content: '';
      flex: 1 1 80px;
      max-width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .header-ornament::after {
      background: linear-gradient(to left, transparent, var(--gold));
    }

    /* ====== UNIT TABS ====== */
    .unit-nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 22px;
      width: 100%;
      max-width: 1080px;
      animation: fadeUp 0.7s ease-out 0.1s both;
    }

    .unit-tab {
      border: 1px solid rgba(184,134,11,0.4);
      background: rgba(26,18,8,0.6);
      color: rgba(253,248,240,0.65);
      padding: 8px 20px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--serif);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
    }

    .unit-tab:hover {
      background: rgba(184,134,11,0.2);
      color: var(--gold-light);
      border-color: var(--gold-light);
    }

    .unit-tab.active {
      background: var(--gold);
      color: var(--ink);
      border-color: var(--gold);
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(184,134,11,0.4);
    }

    /* ====== SHELL ====== */
    .app-shell {
      width: 100%;
      max-width: 1080px;
      background: var(--paper);
      border-radius: 4px;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.5),
        0 0 0 1px rgba(184,134,11,0.3),
        inset 0 1px 0 rgba(255,255,255,0.8);
      overflow: hidden;
      animation: fadeUp 0.5s ease-out 0.2s both;
    }

    /* top decorative band */
    .shell-topband {
      height: 5px;
      background: linear-gradient(90deg, var(--rust), var(--gold), var(--rust-light), var(--gold-light), var(--rust));
    }

    /* ====== UNIT HEADER ====== */
    .unit-header {
      padding: 28px 36px 22px;
      background: var(--parchment);
      border-bottom: 1px solid var(--border-warm);
      position: relative;
      overflow: hidden;
    }
    .unit-header::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 180px; height: 100%;
      background: radial-gradient(ellipse at right, rgba(184,134,11,0.08), transparent 70%);
    }
    .unit-header-epoch {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .unit-header-title {
      font-family: var(--display);
      font-size: clamp(1.2rem, 3vw, 1.9rem);
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .unit-header-desc {
      font-size: 0.88rem;
      color: #5a4a30;
      font-style: italic;
      font-weight: 300;
    }

    /* ====== MODE TABS ====== */
    .mode-bar {
      display: flex;
      gap: 0;
      background: var(--parchment);
      border-bottom: 1px solid var(--border-warm);
    }
    .mode-btn {
      flex: 1;
      padding: 13px 10px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-family: var(--serif);
      font-size: 0.85rem;
      color: #7a6040;
      letter-spacing: 0.04em;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .mode-btn:hover {
      background: rgba(184,134,11,0.08);
      color: var(--gold);
    }
    .mode-btn.active {
      border-bottom-color: var(--gold);
      color: var(--ink);
      font-weight: 600;
      background: rgba(184,134,11,0.06);
    }
    .mode-btn .btn-icon { font-size: 1rem; }

    /* ====== CONTENT PANEL ====== */
    .content-panel {
      padding: 32px 36px 40px;
      min-height: 480px;
      line-height: 1.8;
      font-size: 0.95rem;
      color: #2a1f0e;
    }

    /* ====== READING STYLES ====== */
    .content-panel h2 {
      font-family: var(--display);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--rust);
      margin: 28px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(139,58,15,0.2);
    }
    .content-panel h2:first-child { margin-top: 0; }

    .content-panel h3 {
      font-family: var(--display);
      font-size: 1rem;
      font-weight: 600;
      color: var(--teal);
      margin: 18px 0 7px;
    }

    .content-panel p {
      margin: 8px 0;
      color: #2a1f0e;
    }

    .content-panel ul {
      margin: 8px 0 10px 1.5rem;
    }
    .content-panel li {
      margin: 5px 0;
      position: relative;
    }
    .content-panel li::marker {
      color: var(--gold);
    }

    .highlight {
      color: var(--rust);
      font-weight: 600;
    }

    .section-tag {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .divider {
      margin: 22px 0;
      border: none;
      border-top: 1px dashed rgba(184,134,11,0.3);
    }

    /* ====== SUMMARY STYLES ====== */
    .summary-grid {
      display: grid;
      gap: 14px;
      margin-top: 12px;
    }
    .summary-card {
      background: var(--parchment);
      border: 1px solid var(--border-warm);
      border-left: 4px solid var(--gold);
      border-radius: 3px;
      padding: 14px 18px;
      font-size: 0.9rem;
      line-height: 1.65;
    }
    .summary-card strong {
      color: var(--rust);
    }

    /* ====== QUIZ STYLES ====== */
    .quiz-intro {
      background: var(--parchment);
      border: 1px solid var(--border-warm);
      border-radius: 3px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 0.88rem;
      color: #5a4a30;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .quiz-intro-icon { font-size: 1.4rem; }

    .quiz-score-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .score-pill {
      background: var(--ink);
      color: var(--gold-light);
      padding: 6px 16px;
      border-radius: 2px;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
    }
    .progress-track {
      flex: 1;
      height: 6px;
      background: rgba(184,134,11,0.2);
      border-radius: 3px;
      min-width: 100px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .question-block {
      margin-bottom: 26px;
      border: 1px solid var(--border-warm);
      border-radius: 4px;
      overflow: hidden;
    }
    .question-header {
      background: var(--parchment);
      padding: 14px 18px;
      font-weight: 600;
      font-size: 0.92rem;
      border-bottom: 1px solid var(--border-warm);
      display: flex;
      gap: 10px;
    }
    .q-number {
      background: var(--gold);
      color: var(--ink);
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .options-list {
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .option-btn {
      text-align: left;
      padding: 10px 14px;
      border: 1px solid rgba(184,134,11,0.3);
      border-radius: 3px;
      background: #fff;
      cursor: pointer;
      font-family: var(--serif);
      font-size: 0.88rem;
      color: var(--ink);
      transition: all 0.18s;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .option-btn:hover:not(:disabled) {
      background: rgba(184,134,11,0.08);
      border-color: var(--gold);
    }
    .option-letter {
      width: 22px;
      height: 22px;
      border: 1px solid rgba(184,134,11,0.5);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
      color: var(--gold);
    }
    .option-btn.correct {
      background: rgba(26,107,107,0.1);
      border-color: var(--teal);
      color: var(--teal);
    }
    .option-btn.correct .option-letter {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
    }
    .option-btn.wrong {
      background: rgba(139,58,15,0.1);
      border-color: var(--rust);
      color: var(--rust);
    }
    .option-btn.wrong .option-letter {
      background: var(--rust);
      color: #fff;
      border-color: var(--rust);
    }
    .option-btn:disabled { cursor: default; }

    .feedback-box {
      margin: 0 18px 14px;
      padding: 10px 14px;
      border-radius: 3px;
      font-size: 0.85rem;
      line-height: 1.55;
      display: none;
    }
    .feedback-box.correct {
      background: rgba(26,107,107,0.1);
      border: 1px solid rgba(26,107,107,0.35);
      color: var(--teal);
    }
    .feedback-box.wrong {
      background: rgba(139,58,15,0.08);
      border: 1px solid rgba(139,58,15,0.3);
      color: var(--rust);
    }
    .feedback-box.show { display: block; }

    .quiz-result-panel {
      margin-top: 28px;
      padding: 24px 28px;
      background: var(--parchment);
      border: 1px solid var(--border-warm);
      border-radius: 4px;
      text-align: center;
    }
    .result-score {
      font-family: var(--display);
      font-size: 3rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 6px;
    }
    .result-label {
      font-size: 0.9rem;
      color: #5a4a30;
      margin-bottom: 18px;
    }
    .result-message {
      font-size: 1rem;
      color: var(--ink);
      margin-bottom: 20px;
      font-style: italic;
    }
    .retry-btn {
      background: var(--ink);
      color: var(--gold-light);
      border: none;
      padding: 11px 28px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--serif);
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #2e2212; }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 640px) {
      .content-panel { padding: 22px 20px 30px; }
      .unit-header { padding: 20px 20px 16px; }
    }

    /* ====== ANIMATIONS ====== */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeUp 0.35s ease-out both;
    }

    /* ====== FOOTER EXAM BUTTON ====== */
    .app-footer {
      width: 100%;
      max-width: 1080px;
      margin-top: 32px;
      display: flex;
      justify-content: center;
    }
    .exam-mode-btn {
      background: linear-gradient(135deg, #1a0a00, #2e1505);
      border: 1px solid var(--gold);
      color: var(--gold-light);
      padding: 16px 44px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--display);
      font-size: 1rem;
      letter-spacing: 0.08em;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(212,168,67,0.2);
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .exam-mode-btn:hover {
      background: linear-gradient(135deg, #2e1505, #4a1f00);
      box-shadow: 0 12px 40px rgba(184,134,11,0.3), inset 0 1px 0 rgba(212,168,67,0.3);
      transform: translateY(-2px);
      color: var(--gold);
    }
    .exam-mode-btn .exam-icon { font-size: 1.3rem; }

    /* ====== EXAM OVERLAY ====== */
    .exam-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,6,2,0.96);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      padding: 0 16px 60px;
    }
    .exam-overlay.hidden { display: none; }

    /* Exam header */
    .exam-topbar {
      width: 100%;
      max-width: 860px;
      padding: 22px 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid rgba(184,134,11,0.25);
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .exam-topbar-left {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .exam-label {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
    }
    .exam-title {
      font-family: var(--display);
      font-size: 1.4rem;
      color: var(--paper);
    }
    .exam-close-btn {
      background: rgba(253,248,240,0.06);
      border: 1px solid rgba(184,134,11,0.4);
      color: rgba(253,248,240,0.7);
      padding: 8px 18px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--serif);
      font-size: 0.82rem;
      transition: all 0.2s;
    }
    .exam-close-btn:hover {
      background: rgba(184,134,11,0.15);
      color: var(--gold-light);
    }

    /* Challenge picker */
    .challenge-picker {
      width: 100%;
      max-width: 860px;
      animation: fadeUp 0.4s ease-out both;
    }
    .picker-eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(212,168,67,0.7);
      margin-bottom: 18px;
      text-align: center;
    }
    .challenge-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }
    .challenge-card {
      background: linear-gradient(135deg, rgba(30,15,5,0.9), rgba(20,10,3,0.95));
      border: 1px solid rgba(184,134,11,0.35);
      border-radius: 4px;
      padding: 28px 24px;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .challenge-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .challenge-card:hover::before { opacity: 1; }
    .challenge-card:hover {
      border-color: var(--gold-light);
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(184,134,11,0.2);
    }
    .challenge-card.featured {
      border-color: rgba(184,134,11,0.6);
      background: linear-gradient(135deg, rgba(50,25,5,0.95), rgba(30,12,3,0.98));
    }
    .card-num {
      font-family: var(--display);
      font-size: 3.2rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 6px;
      text-shadow: 0 4px 20px rgba(184,134,11,0.4);
    }
    .card-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(212,168,67,0.65);
      margin-bottom: 12px;
    }
    .card-name {
      font-family: var(--display);
      font-size: 1.05rem;
      color: var(--paper);
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 0.8rem;
      color: rgba(253,248,240,0.45);
      line-height: 1.5;
    }
    .card-badge {
      display: inline-block;
      margin-top: 14px;
      padding: 4px 12px;
      border-radius: 2px;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      background: rgba(184,134,11,0.15);
      color: var(--gold-light);
      border: 1px solid rgba(184,134,11,0.3);
    }

    /* Exam in progress */
    .exam-arena {
      width: 100%;
      max-width: 860px;
      display: none;
    }
    .exam-arena.active { display: block; }

    .exam-progress-header {
      background: rgba(20,10,3,0.8);
      border: 1px solid rgba(184,134,11,0.3);
      border-radius: 4px;
      padding: 16px 22px;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .exam-progress-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 100px;
    }
    .exam-q-counter {
      font-family: var(--display);
      font-size: 1.1rem;
      color: var(--gold-light);
    }
    .exam-unit-badge {
      font-size: 0.72rem;
      color: rgba(212,168,67,0.6);
      letter-spacing: 0.1em;
    }
    .exam-prog-track {
      flex: 1;
      height: 5px;
      background: rgba(184,134,11,0.15);
      border-radius: 3px;
      min-width: 80px;
      overflow: hidden;
    }
    .exam-prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--rust), var(--gold));
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .exam-live-score {
      font-size: 0.82rem;
      color: rgba(253,248,240,0.5);
      white-space: nowrap;
    }

    /* Single exam question card */
    .exam-question-card {
      background: linear-gradient(135deg, rgba(25,12,4,0.95), rgba(15,7,2,0.98));
      border: 1px solid rgba(184,134,11,0.3);
      border-radius: 4px;
      overflow: hidden;
      animation: fadeUp 0.3s ease-out both;
    }
    .exam-q-header {
      background: rgba(184,134,11,0.08);
      padding: 18px 24px;
      border-bottom: 1px solid rgba(184,134,11,0.2);
      font-size: 1rem;
      color: var(--paper);
      line-height: 1.55;
      display: flex;
      gap: 14px;
    }
    .exam-q-num {
      background: var(--gold);
      color: var(--ink);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .exam-options {
      padding: 18px 24px;
      display: flex;

<p>La Ilustración (s. XVIII) propugna el uso de la razón como instrumento principal del progreso humano. Critica la tradición, la superstición y el poder arbitrario.</p>

// ============================================================
//  STATE
// ============================================================
let currentUnit = 'vi';
let currentMode = 'lectura';
let quizState = {};

function initQuizState(unitKey) {
  const q = units[unitKey].quiz;
  quizState[unitKey] = {
    answered: new Array(q.length).fill(null), // null | 'correct' | 'wrong'
    done: false
  };
}

// ============================================================
//  RENDER
// ============================================================
function renderUnit(unitKey, mode) {
  const u = units[unitKey];
  document.getElementById('headerEpoch').textContent = u.epoch;
  document.getElementById('headerTitle').textContent = u.title;
  document.getElementById('headerDesc').textContent = u.desc;

  document.querySelectorAll('.unit-tab').forEach(t => t.classList.toggle('active', t.dataset.unit === unitKey));
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));

  const panel = document.getElementById('contentPanel');
  panel.className = 'content-panel fade-in';
  // force reflow for animation
  void panel.offsetWidth;

  if (mode === 'lectura') {
    panel.innerHTML = u.lectura;
  } else if (mode === 'resumen') {
    renderResumen(panel, u);
  } else {
    renderQuiz(panel, unitKey);
  }
}

function renderResumen(panel, u) {
  let html = `<div class="summary-grid">`;
  u.resumen.forEach(item => {
    html += `<div class="summary-card"><strong>${item.key}</strong><br>${item.val}</div>`;
  });
  html += `</div>`;
  panel.innerHTML = html;
}

function renderQuiz(panel, unitKey) {
  if (!quizState[unitKey]) initQuizState(unitKey);
  const state = quizState[unitKey];
  const qs = units[unitKey].quiz;

  const answered = state.answered.filter(a => a !== null).length;
  const correct  = state.answered.filter(a => a === 'correct').length;
  const pct = qs.length > 0 ? Math.round((answered / qs.length) * 100) : 0;

  let html = `
    <div class="quiz-intro">
      <span class="quiz-intro-icon">⚖️</span>
      <span>Seleccioná la opción correcta. Cada pregunta muestra retroalimentación inmediata.</span>
    </div>
    <div class="quiz-score-bar">
      <div class="score-pill">✔ ${correct} / ${qs.length}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span style="font-size:0.8rem;color:#7a6040">${answered} respondidas</span>
    </div>
  `;

  qs.forEach((q, qi) => {
    const ans = state.answered[qi]; // null | 'correct' | 'wrong'
    html += `<div class="question-block" id="qblock-${qi}">
      <div class="question-header">
        <span class="q-number">${qi + 1}</span>
        <span>${q.q}</span>
      </div>
      <div class="options-list">`;

    const letters = ['A', 'B', 'C', 'D'];
    q.opts.forEach((opt, oi) => {
      let cls = '';
      if (ans !== null) {
        if (oi === q.ans) cls = 'correct';
        else if (state.answered[qi] === 'wrong' && oi === state.selected[qi]) cls = 'wrong';
      }
      html += `<button class="option-btn ${cls}" ${ans !== null ? 'disabled' : ''}
        onclick="selectAnswer(${qi}, ${oi}, '${unitKey}')">
        <span class="option-letter">${letters[oi]}</span>
        <span>${opt}</span>
      </button>`;
    });

    html += `</div>`;
    if (ans !== null) {
      html += `<div class="feedback-box ${ans} show">
        ${ans === 'correct' ? '✔ ' : '✘ '} ${q.fb}
      </div>`;
    }
    html += `</div>`;
  });

  if (state.done) {
    const pctScore = Math.round((correct / qs.length) * 100);
    let msg = pctScore >= 90 ? "¡Excelente dominio de la unidad!" :
              pctScore >= 70 ? "Buen trabajo. Repasá los puntos que fallaste." :
              "Revisá la lectura antes de volver a intentar.";
    html += `<div class="quiz-result-panel">
      <div class="result-score">${pctScore}%</div>
      <div class="result-label">${correct} correctas de ${qs.length}</div>
      <div class="result-message">${msg}</div>
      <button class="retry-btn" onclick="retryQuiz('${unitKey}')">↺ Reintentar</button>
    </div>`;
  }

  panel.innerHTML = html;
}

// ============================================================
//  INTERACTIONS
// ============================================================
function selectAnswer(qi, selectedOpt, unitKey) {
  if (!quizState[unitKey]) initQuizState(unitKey);
  const state = quizState[unitKey];
  if (state.answered[qi] !== null) return;

  const q = units[unitKey].quiz[qi];
  const isCorrect = selectedOpt === q.ans;
  state.answered[qi] = isCorrect ? 'correct' : 'wrong';
  if (!state.selected) state.selected = [];
  state.selected[qi] = selectedOpt;

  const allAnswered = state.answered.every(a => a !== null);
  if (allAnswered) state.done = true;

  // Re-render quiz preserving scroll
  const panel = document.getElementById('contentPanel');
  const scrollY = panel.scrollTop;
  renderQuiz(panel, unitKey);
  panel.scrollTop = scrollY;
}

function retryQuiz(unitKey) {
  initQuizState(unitKey);
  renderQuiz(document.getElementById('contentPanel'), unitKey);
}

// Event listeners
document.querySelectorAll('.unit-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    currentUnit = tab.dataset.unit;
    currentMode = 'lectura';
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === 'lectura'));
    renderUnit(currentUnit, currentMode);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentMode = btn.dataset.mode;
    renderUnit(currentUnit, currentMode);
  });
});

// Initial render
renderUnit(currentUnit, currentMode);
</script>
