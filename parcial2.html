<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historia de las Instituciones Jurídicas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1208;
      --paper: #fdf8f0;
      --parchment: #f5edd8;
      --gold: #b8860b;
      --gold-light: #d4a843;
      --gold-muted: rgba(184,134,11,0.18);
      --rust: #8b3a0f;
      --rust-light: #c04a18;
      --teal: #1a6b6b;
      --shadow-warm: rgba(26,18,8,0.18);
      --border-warm: rgba(184,134,11,0.35);
      --serif: 'Source Serif 4', Georgia, serif;
      --display: 'Playfair Display', Georgia, serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--serif);
      background: #2a1f0e;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(184,134,11,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(139,58,15,0.1) 0%, transparent 50%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 60px;
      color: var(--ink);
    }

    /* ====== HEADER ====== */
    .app-header {
      width: 100%;
      max-width: 1080px;
      text-align: center;
      margin-bottom: 28px;
      animation: fadeDown 0.6s ease-out;
    }

    .header-eyebrow {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .header-title {
      font-family: var(--display);
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 700;
      color: var(--paper);
      line-height: 1.15;
      letter-spacing: -0.01em;
      text-shadow: 0 2px 20px rgba(0,0,0,0.4);
      margin-bottom: 6px;
    }

    .header-sub {
      font-size: 0.88rem;
      color: rgba(253,248,240,0.55);
      font-weight: 300;
      font-style: italic;
    }

    .header-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 14px 0;
      color: var(--gold);
      opacity: 0.7;
      font-size: 0.85rem;
    }
    .header-ornament::before, .header-ornament::after {
      content: '';
      flex: 1 1 80px;
      max-width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .header-ornament::after {
      background: linear-gradient(to left, transparent, var(--gold));
    }

    /* ====== UNIT TABS ====== */
    .unit-nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 22px;
      width: 100%;
      max-width: 1080px;
      animation: fadeUp 0.7s ease-out 0.1s both;
    }

    .unit-tab {
      border: 1px solid rgba(184,134,11,0.4);
      background: rgba(26,18,8,0.6);
      color: rgba(253,248,240,0.65);
      padding: 8px 20px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--serif);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
    }

    .unit-tab:hover {
      background: rgba(184,134,11,0.2);
      color: var(--gold-light);
      border-color: var(--gold-light);
    }

    .unit-tab.active {
      background: var(--gold);
      color: var(--ink);
      border-color: var(--gold);
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(184,134,11,0.4);
    }

    /* ====== SHELL ====== */
    .app-shell {
      width: 100%;
      max-width: 1080px;
      background: var(--paper);
      border-radius: 4px;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.5),
        0 0 0 1px rgba(184,134,11,0.3),
        inset 0 1px 0 rgba(255,255,255,0.8);
      overflow: hidden;
      animation: fadeUp 0.5s ease-out 0.2s both;
    }

    /* top decorative band */
    .shell-topband {
      height: 5px;
      background: linear-gradient(90deg, var(--rust), var(--gold), var(--rust-light), var(--gold-light), var(--rust));
    }

    /* ====== UNIT HEADER ====== */
    .unit-header {
      padding: 28px 36px 22px;
      background: var(--parchment);
      border-bottom: 1px solid var(--border-warm);
      position: relative;
      overflow: hidden;
    }
    .unit-header::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 180px; height: 100%;
      background: radial-gradient(ellipse at right, rgba(184,134,11,0.08), transparent 70%);
    }
    .unit-header-epoch {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .unit-header-title {
      font-family: var(--display);
      font-size: clamp(1.2rem, 3vw, 1.9rem);
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .unit-header-desc {
      font-size: 0.88rem;
      color: #5a4a30;
      font-style: italic;
      font-weight: 300;
    }

    /* ====== MODE TABS ====== */
    .mode-bar {
      display: flex;
      gap: 0;
      background: var(--parchment);
      border-bottom: 1px solid var(--border-warm);
    }
    .mode-btn {
      flex: 1;
      padding: 13px 10px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-family: var(--serif);
      font-size: 0.85rem;
      color: #7a6040;
      letter-spacing: 0.04em;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .mode-btn:hover {
      background: rgba(184,134,11,0.08);
      color: var(--gold);
    }
    .mode-btn.active {
      border-bottom-color: var(--gold);
      color: var(--ink);
      font-weight: 600;
      background: rgba(184,134,11,0.06);
    }
    .mode-btn .btn-icon { font-size: 1rem; }

    /* ====== CONTENT PANEL ====== */
    .content-panel {
      padding: 32px 36px 40px;
      min-height: 480px;
      line-height: 1.8;
      font-size: 0.95rem;
      color: #2a1f0e;
    }

    /* ====== READING STYLES ====== */
    .content-panel h2 {
      font-family: var(--display);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--rust);
      margin: 28px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(139,58,15,0.2);
    }
    .content-panel h2:first-child { margin-top: 0; }

    .content-panel h3 {
      font-family: var(--display);
      font-size: 1rem;
      font-weight: 600;
      color: var(--teal);
      margin: 18px 0 7px;
    }

    .content-panel p {
      margin: 8px 0;
      color: #2a1f0e;
    }

    .content-panel ul {
      margin: 8px 0 10px 1.5rem;
    }
    .content-panel li {
      margin: 5px 0;
      position: relative;
    }
    .content-panel li::marker {
      color: var(--gold);
    }

    .highlight {
      color: var(--rust);
      font-weight: 600;
    }

    .section-tag {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .divider {
      margin: 22px 0;
      border: none;
      border-top: 1px dashed rgba(184,134,11,0.3);
    }

    /* ====== SUMMARY STYLES ====== */
    .summary-grid {
      display: grid;
      gap: 14px;
      margin-top: 12px;
    }
    .summary-card {
      background: var(--parchment);
      border: 1px solid var(--border-warm);
      border-left: 4px solid var(--gold);
      border-radius: 3px;
      padding: 14px 18px;
      font-size: 0.9rem;
      line-height: 1.65;
    }
    .summary-card strong {
      color: var(--rust);
    }

    /* ====== QUIZ STYLES ====== */
    .quiz-intro {
      background: var(--parchment);
      border: 1px solid var(--border-warm);
      border-radius: 3px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 0.88rem;
      color: #5a4a30;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .quiz-intro-icon { font-size: 1.4rem; }

    .quiz-score-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .score-pill {
      background: var(--ink);
      color: var(--gold-light);
      padding: 6px 16px;
      border-radius: 2px;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
    }
    .progress-track {
      flex: 1;
      height: 6px;
      background: rgba(184,134,11,0.2);
      border-radius: 3px;
      min-width: 100px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .question-block {
      margin-bottom: 26px;
      border: 1px solid var(--border-warm);
      border-radius: 4px;
      overflow: hidden;
    }
    .question-header {
      background: var(--parchment);
      padding: 14px 18px;
      font-weight: 600;
      font-size: 0.92rem;
      border-bottom: 1px solid var(--border-warm);
      display: flex;
      gap: 10px;
    }
    .q-number {
      background: var(--gold);
      color: var(--ink);
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .options-list {
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .option-btn {
      text-align: left;
      padding: 10px 14px;
      border: 1px solid rgba(184,134,11,0.3);
      border-radius: 3px;
      background: #fff;
      cursor: pointer;
      font-family: var(--serif);
      font-size: 0.88rem;
      color: var(--ink);
      transition: all 0.18s;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .option-btn:hover:not(:disabled) {
      background: rgba(184,134,11,0.08);
      border-color: var(--gold);
    }
    .option-letter {
      width: 22px;
      height: 22px;
      border: 1px solid rgba(184,134,11,0.5);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
      color: var(--gold);
    }
    .option-btn.correct {
      background: rgba(26,107,107,0.1);
      border-color: var(--teal);
      color: var(--teal);
    }
    .option-btn.correct .option-letter {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
    }
    .option-btn.wrong {
      background: rgba(139,58,15,0.1);
      border-color: var(--rust);
      color: var(--rust);
    }
    .option-btn.wrong .option-letter {
      background: var(--rust);
      color: #fff;
      border-color: var(--rust);
    }
    .option-btn:disabled { cursor: default; }

    .feedback-box {
      margin: 0 18px 14px;
      padding: 10px 14px;
      border-radius: 3px;
      font-size: 0.85rem;
      line-height: 1.55;
      display: none;
    }
    .feedback-box.correct {
      background: rgba(26,107,107,0.1);
      border: 1px solid rgba(26,107,107,0.35);
      color: var(--teal);
    }
    .feedback-box.wrong {
      background: rgba(139,58,15,0.08);
      border: 1px solid rgba(139,58,15,0.3);
      color: var(--rust);
    }
    .feedback-box.show { display: block; }

    .quiz-result-panel {
      margin-top: 28px;
      padding: 24px 28px;
      background: var(--parchment);
      border: 1px solid var(--border-warm);
      border-radius: 4px;
      text-align: center;
    }
    .result-score {
      font-family: var(--display);
      font-size: 3rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 6px;
    }
    .result-label {
      font-size: 0.9rem;
      color: #5a4a30;
      margin-bottom: 18px;
    }
    .result-message {
      font-size: 1rem;
      color: var(--ink);
      margin-bottom: 20px;
      font-style: italic;
    }
    .retry-btn {
      background: var(--ink);
      color: var(--gold-light);
      border: none;
      padding: 11px 28px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--serif);
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #2e2212; }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 640px) {
      .content-panel { padding: 22px 20px 30px; }
      .unit-header { padding: 20px 20px 16px; }
    }

    /* ====== ANIMATIONS ====== */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeUp 0.35s ease-out both;
    }

    /* ====== FOOTER EXAM BUTTON ====== */
    .app-footer {
      width: 100%;
      max-width: 1080px;
      margin-top: 32px;
      display: flex;
      justify-content: center;
    }
    .exam-mode-btn {
      background: linear-gradient(135deg, #1a0a00, #2e1505);
      border: 1px solid var(--gold);
      color: var(--gold-light);
      padding: 16px 44px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--display);
      font-size: 1rem;
      letter-spacing: 0.08em;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(212,168,67,0.2);
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .exam-mode-btn:hover {
      background: linear-gradient(135deg, #2e1505, #4a1f00);
      box-shadow: 0 12px 40px rgba(184,134,11,0.3), inset 0 1px 0 rgba(212,168,67,0.3);
      transform: translateY(-2px);
      color: var(--gold);
    }
    .exam-mode-btn .exam-icon { font-size: 1.3rem; }

    /* ====== EXAM OVERLAY ====== */
    .exam-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,6,2,0.96);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      padding: 0 16px 60px;
    }
    .exam-overlay.hidden { display: none; }

    /* Exam header */
    .exam-topbar {
      width: 100%;
      max-width: 860px;
      padding: 22px 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid rgba(184,134,11,0.25);
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .exam-topbar-left {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .exam-label {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
    }
    .exam-title {
      font-family: var(--display);
      font-size: 1.4rem;
      color: var(--paper);
    }
    .exam-close-btn {
      background: rgba(253,248,240,0.06);
      border: 1px solid rgba(184,134,11,0.4);
      color: rgba(253,248,240,0.7);
      padding: 8px 18px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--serif);
      font-size: 0.82rem;
      transition: all 0.2s;
    }
    .exam-close-btn:hover {
      background: rgba(184,134,11,0.15);
      color: var(--gold-light);
    }

    /* Challenge picker */
    .challenge-picker {
      width: 100%;
      max-width: 860px;
      animation: fadeUp 0.4s ease-out both;
    }
    .picker-eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(212,168,67,0.7);
      margin-bottom: 18px;
      text-align: center;
    }
    .challenge-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }
    .challenge-card {
      background: linear-gradient(135deg, rgba(30,15,5,0.9), rgba(20,10,3,0.95));
      border: 1px solid rgba(184,134,11,0.35);
      border-radius: 4px;
      padding: 28px 24px;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .challenge-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .challenge-card:hover::before { opacity: 1; }
    .challenge-card:hover {
      border-color: var(--gold-light);
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(184,134,11,0.2);
    }
    .challenge-card.featured {
      border-color: rgba(184,134,11,0.6);
      background: linear-gradient(135deg, rgba(50,25,5,0.95), rgba(30,12,3,0.98));
    }
    .card-num {
      font-family: var(--display);
      font-size: 3.2rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 6px;
      text-shadow: 0 4px 20px rgba(184,134,11,0.4);
    }
    .card-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(212,168,67,0.65);
      margin-bottom: 12px;
    }
    .card-name {
      font-family: var(--display);
      font-size: 1.05rem;
      color: var(--paper);
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 0.8rem;
      color: rgba(253,248,240,0.45);
      line-height: 1.5;
    }
    .card-badge {
      display: inline-block;
      margin-top: 14px;
      padding: 4px 12px;
      border-radius: 2px;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      background: rgba(184,134,11,0.15);
      color: var(--gold-light);
      border: 1px solid rgba(184,134,11,0.3);
    }

    /* Exam in progress */
    .exam-arena {
      width: 100%;
      max-width: 860px;
      display: none;
    }
    .exam-arena.active { display: block; }

    .exam-progress-header {
      background: rgba(20,10,3,0.8);
      border: 1px solid rgba(184,134,11,0.3);
      border-radius: 4px;
      padding: 16px 22px;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .exam-progress-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 100px;
    }
    .exam-q-counter {
      font-family: var(--display);
      font-size: 1.1rem;
      color: var(--gold-light);
    }
    .exam-unit-badge {
      font-size: 0.72rem;
      color: rgba(212,168,67,0.6);
      letter-spacing: 0.1em;
    }
    .exam-prog-track {
      flex: 1;
      height: 5px;
      background: rgba(184,134,11,0.15);
      border-radius: 3px;
      min-width: 80px;
      overflow: hidden;
    }
    .exam-prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--rust), var(--gold));
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .exam-live-score {
      font-size: 0.82rem;
      color: rgba(253,248,240,0.5);
      white-space: nowrap;
    }

    /* Single exam question card */
    .exam-question-card {
      background: linear-gradient(135deg, rgba(25,12,4,0.95), rgba(15,7,2,0.98));
      border: 1px solid rgba(184,134,11,0.3);
      border-radius: 4px;
      overflow: hidden;
      animation: fadeUp 0.3s ease-out both;
    }
    .exam-q-header {
      background: rgba(184,134,11,0.08);
      padding: 18px 24px;
      border-bottom: 1px solid rgba(184,134,11,0.2);
      font-size: 1rem;
      color: var(--paper);
      line-height: 1.55;
      display: flex;
      gap: 14px;
    }
    .exam-q-num {
      background: var(--gold);
      color: var(--ink);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .exam-options {
      padding: 18px 24px;
      display: flex;

<h2>1.1. Origen del SIRG</h2>
<p>El Sacro Imperio Romano Germánico surgió de la desintegración del Imperio Carolingio tras el <span class="highlight">Tratado de Verdún (843)</span>. Al morir el último rey carolingio Luis IV el Niño (911), los duques alemanes eligieron a Conrado I como rey de Germania. Su sucesor, <strong>Enrique I "el Pajarero"</strong>, derrotó a los invasores normandos y húngaros. Su hijo <strong>Otón I</strong> persiguió el ideal de Carlomagno de restaurar el Imperio Romano: quitó poder a los duques apoyándose en condes y obispos, y en el año <span class="highlight">962 el Papa Juan XII lo coronó Emperador de los Romanos</span>, dando inicio al SIRG. El Imperio tenía naturaleza electiva: los señores feudales elegían al Emperador.</p>

<h2>1.2. Relación Iglesia–Imperio</h2>
<p>Otón I buscó el apoyo del clero porque los obispos, al ser célibes, no querían hacer de los ducados un beneficio hereditario. Los invistió de signos de su dignidad. La Iglesia apoyaba al rey y este la apoyaba con la evangelización. El Imperio pasó a ser la organización política de la Iglesia. Esto generó una relación de tensión cuando los emperadores intentaron designar a los obispos como aliados políticos, lo que el Papa interpretó como una intromisión.</p>

<h2>1.3. La Querella de las Investiduras (1075–1122)</h2>
<p>Fue un conflicto entre el Emperador <strong>Enrique IV</strong> y el Papa <strong>Gregorio VII</strong> por el derecho a nombrar obispos. Los obispos poseían el doble poder: temporal (feudo) y espiritual (obispado). Enrique IV confirió la doble investidura con el anillo y el báculo (símbolos pontificios). Gregorio VII excomulgó a todo sacerdote o gobernante que recibiera o confiriera la investidura eclesiástica, afirmando el poder de deponer emperadores. El conflicto se resolvió con el <span class="highlight">Concordato de Worms (1122)</span>: los obispos serían elegidos por los canónigos, el Emperador entrega los símbolos del poder temporal y el Papa los de la dignidad espiritual.</p>

<hr class="divider">
<span class="section-tag">2. La formación de los Estados Nacionales</span>
<h2>2.1. Las Comunas y el surgimiento de la Burguesía</h2>
<p>En el siglo XIII se acelera el movimiento comunal iniciado con las cruzadas. Las comunas fueron aglomeraciones urbanas o rurales que obtuvieron autonomía municipal, civil, política y económica de sus señores. Su fin era conseguir un gobierno electivo autónomo, una organización judicial independiente y la soberanía política. Para plasmar sus conquistas redactaron las <strong>Cartas de Comuna</strong>. Este proceso dio nacimiento a la <span class="highlight">burguesía</span> y preparó gradualmente los Estados modernos.</p>

<h2>2.2. Inglaterra: Carta Magna y Common Law</h2>
<p>La dinasta Plantagenet gozó de poder casi ilimitado hasta 1215. El rey <strong>Juan Sin Tierra</strong> perdió los territorios franceses y proyectó nuevos impuestos, lo que generó una coalición de señores eclesiásticos, civiles, burgos y comunas que se apoderó de Londres. En 1215 Juan Sin Tierra tuvo que firmar la <span class="highlight">Magna Charta Libertatum</span>, que hoy sigue siendo parte importante de la Constitución inglesa.</p>
<p>La Carta Magna establece, entre sus aproximadamente 20 artículos:</p>
<ul>
  <li>Derechos y privilegios de la Iglesia y su gobierno interno.</li>
  <li><strong>Libertad personal</strong>: ningún hombre libre puede ser detenido, preso, declarado fuera de la ley o castigado sin haber sido juzgado según las leyes del reino. Es antecedente del <em>habeas corpus</em>.</li>
  <li><strong>Principio de legalidad</strong> (art. 48): nadie puede ser penado sin juicio.</li>
  <li>El rey no puede imponer impuestos sin aprobación del Gran Consejo (25 nobles).</li>
  <li>Comité de 25 señores para vigilar el cumplimiento de la Carta.</li>
</ul>
<p>Las <span class="highlight">Provisiones de Oxford (1258)</span> ampliaron el control: el monarca reinaría junto a un consejo de 15 personas; el Parlamento debía reunirse al menos 3 veces al año. En 1341 el Parlamento se dividió en dos cámaras: la <strong>Cámara de los Lores</strong> (alta nobleza y clero culto) y la <strong>Cámara de los Comunes</strong> (burgueses y caballeros). Nació así la Monarquía Constitucional. En 1679 se aprobó el <em>habeas corpus</em>; en 1689 el <em>Bill of Rights</em> distribuyó la autoridad entre el rey y el Parlamento.</p>
<p>El <span class="highlight">Common Law</span> es el sistema jurídico no escrito, fundado en costumbres y jurisprudencia, que es el fundamento del derecho en Inglaterra y sus antiguas colonias. Se originó tras la invasión normanda (1066): los jueces viajaban por el país dispensando justicia en nombre del rey y estableciendo un sistema de <strong>precedentes</strong>. Los casos resueltos por sentencias judiciales previas se convierten en guías para casos análogos futuros, haciendo surgir reglas generales.</p>

<h2>2.3. España: Las Siete Partidas</h2>
<p>España se anticipó a las demás naciones en instituciones políticas: ya en el siglo X (974) se reunieron en León frecuentes asambleas llamadas Cortes. El rey <strong>Alfonso X "el Sabio"</strong> publicó el <span class="highlight">Código de las Siete Partidas</span> (compuesto entre 1256 y 1265) para desterrar el desorden en los tribunales. Es un código jurídico de carácter universal y general aplicación para el reino de Castilla:</p>
<ul>
  <li><strong>1ª Partida</strong>: fe católica y fuentes del derecho.</li>
  <li><strong>2ª Partida</strong>: emperadores, reyes y señores; distinción de poderes temporales y espirituales.</li>
  <li><strong>3ª Partida</strong>: justicia y formas procesales.</li>
  <li><strong>4ª Partida</strong>: patria potestad, desposorios y matrimonios.</li>
  <li><strong>5ª Partida</strong>: contratos, obligaciones y derechos reales.</li>
  <li><strong>6ª Partida</strong>: testamentos y herencias.</li>
  <li><strong>7ª Partida</strong>: acusaciones, delitos y penas.</li>
</ul>
<p>Su influencia se prolongó durante siglos y llegó decisivamente hasta el derecho hispanoamericano.</p>

<h2>2.4. Francia: Los Estados Generales</h2>
<p>Los <span class="highlight">Estados Generales</span> fueron creados por el rey Felipe el Hermoso en 1302 como asamblea de las tres órdenes: Nobleza, Clero y Burguesía (Tercer Estado). Eran una concesión del monarca, no una imposición del pueblo. Votaban <strong>por estamento</strong>, no por cabeza: cada estamento deliberaba separado y aportaba un voto; así la nobleza y el clero tenían dos votos contra uno de la burguesía, garantizando siempre el predominio de los privilegiados. Se reunieron con frecuencia hasta el absolutismo (1614) y reaparecieron en 1789, desencadenando la Revolución Francesa.</p>

<hr class="divider">
<span class="section-tag">3. Las Universidades Medievales</span>
<h2>3.1. Origen y organización</h2>
<p>Las universidades medievales nacieron espontáneamente como corporaciones de maestros y estudiantes (universitates), derivadas de instituciones eclesiásticas. Requirieron y obtuvieron la aprobación papal y una amplia autonomía: elegían rector, fijaban su plan de enseñanza y nombraban profesores. Las primeras fueron Oxford y Cambridge (ss. VII–VIII); les siguieron Bolonia (1111), París (1192), Salamanca (1239) y Roma (1245).</p>

<h2>3.2. Universidad de París: la Escolástica</h2>
<p>París se especializó en <strong>Teología</strong>, la "reina de las ciencias". Desarrolló la <span class="highlight">escolástica</span>, caracterizada por el método silogstico tomado de la dialéctica aristotélica. Su mayor representante fue Santo Tomás de Aquino, quien llevó la escolástica a su culminación. La escolástica decayó en el siglo XIV por el abuso del método deductivo y un oscuro formalismo.</p>

<h2>3.3. Universidad de Bolonia: Glosadores y Posglosadores</h2>
<p>Bolonia se especializó en <strong>Derecho Romano y Canónico</strong>. Los <span class="highlight">glosadores</span>, iniciados por <strong>Irnerio</strong> y sus cuatro discípulos (Búlgaro, Martino Gosia, Hugo Alberico y Jacobo de Porta Ravennata), estudiaron los textos de Justiniano (Digesto, Codex, Novelas, Institutas) y realizaban anotaciones marginales o interlineales llamadas <em>glosas</em>. En el siglo XIII, Acursio reunió las glosas en la <em>Glosa Magna</em>. Los <span class="highlight">posglosadores o comentaristas</span> (Cino de Pistoya, Bartolo de Saxoferrato, Baldo de Ubaldis) tomaron la posta en los ss. XIV–XV, adaptando el derecho romano a las necesidades prácticas medievales y aportando material canónico.</p>

<hr class="divider">
<span class="section-tag">4. Los Gremios Medievales</span>
<h2>4.1. Organización y características</h2>
<p>Los <span class="highlight">gremios</span> agrupaban a los trabajadores de un mismo oficio en las ciudades medievales, surgiendo a partir del siglo XI. Tenían carácter local y obligatorio, estaban regidos por un estatuto especial y controlaban toda la actividad artesanal. Se organizaban en tres categorías jerárquicas:</p>
<ul>
  <li><strong>Aprendices</strong>: trabajaban sin sueldo de tres a seis años en el taller de un maestro.</li>
  <li><strong>Oficiales</strong>: artesanos especializados que cobraban salarios, guiados por un maestro.</li>
  <li><strong>Maestros</strong>: dueños de talleres e instrumentos; se accedía superando una prueba llamada "obra maestra".</li>
</ul>

<span class="section-tag">2. El Absolutismo</span>
<h2>2.1. Características de la Monarquía Absoluta</h2>
<p>En el siglo XVII predominó en Europa el <span class="highlight">régimen absoluto</span>. Sus características centrales: la autoridad del monarca era absoluta e ilimitada; la voluntad del rey estaba por encima de todo; el poder se fundaba en el texto de las Sagradas Escrituras ("todo poder viene de Dios") y tenía carácter sagrado.</p>
<ul>
  <li><strong>Francia</strong>: Luis XIV ("El Rey Sol") encarna el apogeo del absolutismo con su frase <em>"L'État, c'est moi"</em>. El ministro Richelieu consolidó el poder real, suprimió a la nobleza disidente y convirtió a Francia en la primera potencia europea.</li>
  <li><strong>Inglaterra</strong>: contrariamente, el Parlamento limitó al rey Carlos I (1628) con la <em>Petición de Derechos</em>; en 1679 se aprobó el <em>Habeas Corpus</em>; en 1689 el <em>Bill of Rights</em> terminó con la monarquía absolutista, distribuyendo la autoridad entre el rey y el Parlamento.</li>
</ul>

<h2>2.2. Thomas Hobbes y la justificación del Absolutismo</h2>
<p>Hobbes (1588–1679), en su obra <em>Leviatán</em> (1651), justifica el absolutismo desde el iusnaturalismo. En el <span class="highlight">estado de naturaleza</span>, la vida del hombre es "solitaria, pobre, desagradable, brutal y corta" (<em>bellum omnium contra omnes</em>). Para escapar de esa guerra perpetua, los hombres ceden todos sus derechos a un soberano absoluto mediante un <strong>contrato social</strong>. El poder del soberano es absoluto, ilimitado, inalienable, indivisible e irrevocable; ningún súbdito puede acusarlo de injusticia, pues la justicia emana de él. El soberano no puede ser depuesto.</p>

<h2>2.3. Nicolás Maquiavelo</h2>
<p>Maquiavelo (1469–1527), en su obra <em>El Príncipe</em>, funda la ciencia política moderna. Considera que la obligación suprema del gobernante es mantener el poder y la seguridad del Estado. Se le atribuye la frase: <span class="highlight">"El fin justifica los medios"</span>.</p>

<hr class="divider">
<span class="section-tag">3. La Ilustración y sus teóricos</span>
<h2>3.1. Características generales</h2>
<p>La Ilustración fue una revolución intelectual que surgió a fines del siglo XVII y se desarrolló en el siglo XVIII, principalmente en Francia e Inglaterra. Su declarada finalidad era disipar las tinieblas de la humanidad mediante las <span class="highlight">luces de la razón</span>. Cuestionó la tradición, la superstición y el poder arbitrario. Favoreció el surgimiento del capitalismo (énfasis en el libre comercio y la propiedad privada) y de la educación pública.</p>

<h2>3.2. John Locke (1632–1704)</h2>
<p>Considerado el padre del liberalismo. En su <em>Segundo Tratado de Gobierno Civil</em> (1690) distingue el <span class="highlight">estado de naturaleza</span> (pacífico, con derechos naturales de vida, libertad y propiedad) de la sociedad política. El pacto social no cede todos los derechos, sino que se forma para <em>proteger</em> esos derechos previos. Si el gobierno los viola, el pueblo tiene derecho a la <strong>resistencia</strong>. Propugna la separación entre poder ejecutivo y poder legislativo.</p>

<h2>3.3. El Barón de Montesquieu (1689–1755)</h2>
<p>En <em>El Espíritu de las Leyes</em>, desarrolla la <span class="highlight">teoría de la separación de poderes</span>: el hombre debe buscar la libertad limitando el poder de los príncipes absolutistas. Los tres poderes deben estar en manos distintas:</p>
<ul>
  <li><strong>Legislativo</strong>: elabora las leyes; reside en el Parlamento.</li>
  <li><strong>Ejecutivo</strong>: aplica las leyes; es desempeñado por el gobierno.</li>
  <li><strong>Judicial</strong>: vela por su cumplimiento; es detentado por los tribunales de justicia.</li>
</ul>
<p>Esta idea es fundacional del constitucionalismo moderno.</p>

<h2>3.4. Jean-Jacques Rousseau (1712–1778)</h2>
<p>Fundador de la democracia moderna, nacido en Ginebra. En <em>El Contrato Social</em> postula que la esencia de la democracia es la <span class="highlight">soberanía popular</span>: reside en el pueblo, es indivisible y fue cedida a la comunidad cuando se formó la sociedad civil. Cada individuo al aceptar el contrato social renuncia a todos sus derechos en favor de la comunidad y acuerda someterse a la <strong>voluntad general</strong>, expresada por voto de la mayoría. La soberanía es inalienable e indivisible.</p>

<h2>3.5. Los Enciclopedistas</h2>
<p>D'Alembert y Diderot dirigieron la <span class="highlight"><em>Encyclopédie</em></span> (1751–1772), obra monumental de 17 volúmenes en cuya ejecución participaron Voltaire, Montesquieu, Rousseau, Quesnay y Condillac. Pretendía reunir todo el saber humano con un espíritu crítico hacia los fanatismos religiosos y políticos, difundiendo la razón y la libertad de pensamiento.</p>

<h2>3.6. Immanuel Kant (1724–1804)</h2>
<p>El filósofo prusiano más influyente de la Europa moderna. Definió el derecho como "el conjunto de condiciones bajo las cuales el arbitrio de un individuo puede coexistir con el arbitrio de otro, según una ley universal de libertad". Sostenía que: (1) gobernados y gobernantes están sometidos al <span class="highlight">Estado de Derecho</span>; (2) el Estado no debe intervenir innecesariamente en las actividades de los individuos; (3) el poder legislativo debe estar separado del ejecutivo. Definió la Ilustración como la "salida del ser humano de su minoría de edad" a través de la razón.</p>

<hr class="divider">
<span class="section-tag">4. La Reforma Protestante y sus efectos jurídicos</span>

<h2>1.1. Antecedentes</h2>
<p>Después de la Guerra de los Siete Años (1763), Inglaterra se convirtió en la primera potencia continental y marítima. Las trece colonias britnicas en América del Norte habían sido autorizadas por el rey Jorge III a elegir su gobierno, dictar leyes y administrar justicia bajo principios democráticos. Las colonias se dividían en: Colonias del Norte (puritanos, pequeñas granjas), Colonias del Centro (ingleses, franceses, vida de campo y ciudad) y Colonias del Sur (terratenientes anglicanos, trabajo esclavo en plantaciones de tabaco, algodón y arroz).</p>

<span class="section-tag">2. La Revolución Francesa (1789–1799)</span>
<h2>2.1. Causas</h2>
<ul>
  <li><strong>Económicas y sociales</strong>: crisis financiera del Estado borbónico; la burguesía chocaba con las restricciones al libre comercio; malas cosechas y hambre generalizada; cierre de fábricas por la competencia de productos ingleses.</li>

<h2>2.2. Etapas principales</h2>
<ul>
  <li><span class="highlight">Asamblea Nacional Constituyente (1789–1791)</span>: abolición del feudalismo; <em>Declaración de los Derechos del Hombre y del Ciudadano</em>; primera Constitución francesa (1791) con soberanía nacional y separación de poderes.</li>
  <li><span class="highlight">Asamblea Legislativa (1791–1792)</span>: sustituye a la Asamblea Constituyente tras redactar la Constitución.</li>
  <li><span class="highlight">La Convención (1792–1795)</span>: Primera República; los jacobinos asumen el poder; el <em>Terror</em> con Robespierre (40.000 ejecuciones en 9 meses); los girondinos ejecutan a Robespierre y elaboran la Constitución de 1795.</li>

<h2>2.3. Declaración de los Derechos del Hombre y del Ciudadano (1789)</h2>
<p>Proclamada en el preámbulo de la Constitución de 1791, proclama libertad, igualdad, soberanía nacional, legalidad y derecho de propiedad. Su principio central: <span class="highlight">la soberanía reside en la Nación</span>; la ley es la expresión de la voluntad general. Nadie puede ser perturbado por sus opiniones mientras no perturbe el orden establecido. Es un hito del constitucionalismo moderno e inspiró la Declaración Universal de Derechos Humanos (1948).</p>

<span class="section-tag">3. Napoleón y la Codificación del Derecho</span>
<h2>3.1. La Era Napoleónica</h2>
<p>Napoleón Bonaparte (1769–1821) ascendió por sus victorias militares durante el Directorio. Como primer cónsul y luego Cónsul Vitalicio (1802), pacificó el Estado francés, creó el Banco de Francia, estableció el franco como moneda nacional y firmó un pacto con la Santa Sede (la Iglesia no reclamaría posesiones perdidas durante la Revolución; separación Iglesia–Estado).</p>

<h2>3.2. El Código Napoleónico (1804)</h2>
<p>En 1800, Napoleón encargó a una comisión (Portalis, Tronchet, Bigot du Préameneu y Malleville) la redacción del proyecto definitivo del <span class="highlight">Código Napoleónico</span>, promulgado el 21 de marzo de 1804. Sus redactores se inspiraron en el Derecho Romano, el antiguo Derecho Consuetudinario y los principios igualitarios de la Revolución. Fue discutido y aprobado en el Consejo de Estado con supervisión personal de Napoleón. Características:</p>
<ul>
  <li>Llamado también "Constitución Civil de los franceses"; base de todo el derecho civil de Francia.</li>

  <li>Proclama igualdad ante la ley, libertad de contratar, propiedad privada y laicidad del Estado.</li>
</ul>

<span class="section-tag">4. El Congreso de Viena y la Restauración</span>
<h2>4.1. El Congreso de Viena (1814–1815)</h2>
<p>Tras la derrota de Napoleón, los vencedores (Austria representada por Metternich, Rusia –Alejandro I–, Gran Bretaña, Prusia, y luego Francia) se reunieron en Viena. Sus objetivos: restaurar el Antiguo Régimen y las dinastías derrocadas, abolir constituciones y reimplantar el absolutismo, recomponer el mapa político de Europa.</p>
<p>El nuevo orden político-ideológico se basó en cuatro principios:</p>
<ul>
  <li><span class="highlight">Legitimidad</span>: derecho divino de los monarcas; regreso al trono de las dinastías reinantes antes de 1789.</li>
  <li><span class="highlight">Absolutismo</span>: poder absoluto del monarca, sin Constitución ni soberanía nacional.</li>
  <li><span class="highlight">Equilibrio</span>: principio de inspiración británica que impedía la expansión de una potencia a costa de otras.</li>
  <li><span class="highlight">Intervencionismo</span>: las potencias intervendrían en territorios donde triunfaran movimientos liberales o nacionalistas.</li>
</ul>

<h2>4.2. La Santa Alianza y el Sistema Metternich</h2>
<p>Los soberanos de Austria (Francisco I), Rusia (Alejandro I) y Prusia (Federico Guillermo III) firmaron el <span class="highlight">Pacto de la Santa Alianza</span>, invocando principios del cristianismo para sustentar las relaciones internacionales. El canciller Metternich le dio un papel más práctico: un brazo armado del absolutismo que celebraba congresos para acordar intervenciones en países con movimientos liberales (Congresos de Aquisgrán 1818, Troppau 1820, Verona 1822). La oposición al sistema fue el Liberalismo y el Nacionalismo, fuerzas que se extendían irreversiblemente por toda Europa.</p>

<span class="section-tag">3. El sistema de Naciones Unidas</span>
<h2>3.1. La ONU (1945)</h2>
<p>La <span class="highlight">Organización de las Naciones Unidas</span> fue creada el 24 de octubre de 1945, tras la Segunda Guerra Mundial, con la firma de la Carta de San Francisco por 51 Estados fundadores. Su sede principal está en Nueva York.</p>
<h3>Propósitos principales</h3>
<ul>
  <li>Mantener la <strong>paz y seguridad internacionales</strong>.</li>
  <li>Fomentar las relaciones de amistad entre naciones.</li>
  <li>Cooperar en la solución de problemas económicos, sociales, culturales y humanitarios.</li>
  <li>Promover el respeto de los derechos humanos.</li>
</ul>
<h3>Órganos principales</h3>
<ul>
  <li><strong>Asamblea General</strong>: todos los Estados miembros (193 actualmente); un Estado, un voto.</li>
  <li><strong>Consejo de Seguridad</strong>: 15 miembros; 5 permanentes con <span class="highlight">derecho de veto</span> (EE. UU., Rusia, China, Reino Unido, Francia).</li>
  <li><strong>Corte Internacional de Justicia</strong>: órgano judicial principal; resuelve controversias entre Estados.</li>
  <li><strong>Secretaría</strong>: encabezada por el Secretario General.</li>
</ul>

<hr class="divider">
<h2>3.2. La Declaración Universal de Derechos Humanos (1948)</h2>
<p>Aprobada por la Asamblea General de la ONU el <span class="highlight">10 de diciembre de 1948</span>, la DUDH proclama un catálogo de derechos inherentes a toda persona, independientemente de su nacionalidad, raza, religión o condición social.</p>
<ul>
  <li><strong>Derechos civiles y políticos</strong>: vida, libertad, no ser sometido a tortura, igualdad ante la ley, libertad de expresión, de reunión.</li>
  <li><strong>Derechos económicos, sociales y culturales</strong>: trabajo, educación, salud, participación en la vida cultural.</li>
  <li>Principio central: <span class="highlight">universalidad, indivisibilidad e inalienabilidad</span> de los derechos humanos.</li>
  <li>No es un tratado vinculante, pero sienta las bases del derecho internacional de los derechos humanos.</li>
</ul>

<hr class="divider">
<span class="section-tag">4. Sistema Interamericano de Derechos Humanos</span>
<h2>4.1. La OEA (1948)</h2>
<p>La <span class="highlight">Organización de los Estados Americanos</span> fue fundada el 30 de abril de 1948 en Bogotá (Colombia) con la firma de la Carta de la OEA. Agrupa a los 35 Estados independientes del continente americano.</p>
<ul>
  <li>Promueve la <strong>democracia representativa</strong>, los derechos humanos, la seguridad y el desarrollo.</li>
  <li>La <span class="highlight">Carta Democrática Interamericana (2001)</span> permite suspender a Estados miembros que rompan el orden democrático.</li>
  <li>Sede en Washington D.C.</li>
</ul>
<h2>4.2. La Convención Americana sobre Derechos Humanos (1969)</h2>
<p>Conocida como <span class="highlight">Pacto de San José de Costa Rica</span>, establece los derechos civiles y políticos protegidos en el sistema interamericano y crea los mecanismos de protección.</p>
<h2>4.3. La Corte Interamericana de Derechos Humanos (Corte IDH)</h2>
<ul>
  <li>Creada en 1979; sede en San José (Costa Rica).</li>
  <li>Tiene <strong>competencia contenciosa</strong> (juzga violaciones cometidas por Estados parte) y <strong>consultiva</strong> (emite opiniones sobre interpretación de la Convención).</li>
  <li>Sus sentencias son <span class="highlight">obligatorias</span> para los Estados que aceptaron su jurisdicción.</li>

</ul>
<h2>4.4. La Comisión Interamericana de Derechos Humanos (CIDH)</h2>
<ul>
  <li>Recibe peticiones individuales por violaciones de derechos humanos.</li>
  <li>Investiga, formula recomendaciones y puede llevar casos ante la Corte IDH.</li>
</ul>

<span class="section-tag">5. Globalización e integración regional</span>
<h2>5.1. La globalización</h2>
<p>La globalización es el proceso de creciente <span class="highlight">interdependencia económica, política, cultural y tecnológica</span> entre los Estados y sociedades del mundo, acelerado desde finales del siglo XX.</p>
<ul>
  <li><strong>Dimensión económica</strong>: libre circulación de bienes, servicios y capitales; organismos como la OMC, FMI y Banco Mundial.</li>
  <li><strong>Dimensión jurídica</strong>: surgimiento del derecho internacional económico, tratados de libre comercio, arbitraje internacional.</li>
  <li><strong>Dimensión política</strong>: erosión relativa de la soberanía estatal; aparición de actores no estatales (ONG, empresas transnacionales).</li>
  <li><strong>Desafíos</strong>: desigualdad entre países, erosión de derechos laborales, cambio climático y flujos migratorios.</li>
</ul>

<h2>5.2. La Unión Europea (UE)</h2>
<p>Proceso de integración regional más avanzado del mundo, iniciado tras la Segunda Guerra Mundial como proyecto de paz y cooperación económica.</p>
<ul>
  <li><span class="highlight">Tratados de Roma (1957)</span>: crean la Comunidad Económica Europea (CEE).</li>
  <li><span class="highlight">Acta Única Europea (1986)</span>: impulsa el mercado interior único.</li>
  <li><span class="highlight">Tratado de Maastricht (1992)</span>: crea formalmente la Unión Europea y establece la ciudadanía europea.</li>
  <li><span class="highlight">Tratado de Lisboa (2007)</span>: reforma institucional; crea el cargo de Presidente del Consejo Europeo y el Alto Representante para Asuntos Exteriores.</li>
  <li>La UE garantiza las <strong>cuatro libertades fundamentales</strong>: libre circulación de bienes, servicios, personas y capitales.</li>
  <li>Cuenta con instituciones propias: Parlamento Europeo, Consejo de la UE, Comisión Europea y Tribunal de Justicia de la UE.</li>
  <li><span class="highlight">Brexit (2020)</span>: salida del Reino Unido de la UE, primer caso de desintegración en la historia de la organización.</li>
</ul>

// ============================================================
//  STATE
// ============================================================
let currentUnit = 'vi';
let currentMode = 'lectura';
let quizState = {};

function initQuizState(unitKey) {
  const q = units[unitKey].quiz;
  quizState[unitKey] = {
    answered: new Array(q.length).fill(null), // null | 'correct' | 'wrong'
    done: false
  };
}

// ============================================================
//  RENDER
// ============================================================
function renderUnit(unitKey, mode) {
  const u = units[unitKey];
  document.getElementById('headerEpoch').textContent = u.epoch;
  document.getElementById('headerTitle').textContent = u.title;
  document.getElementById('headerDesc').textContent = u.desc;

  document.querySelectorAll('.unit-tab').forEach(t => t.classList.toggle('active', t.dataset.unit === unitKey));
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));

  const panel = document.getElementById('contentPanel');
  panel.className = 'content-panel fade-in';
  // force reflow for animation
  void panel.offsetWidth;

  if (mode === 'lectura') {
    panel.innerHTML = u.lectura;
  } else if (mode === 'resumen') {
    renderResumen(panel, u);
  } else {
    renderQuiz(panel, unitKey);
  }
}

function renderResumen(panel, u) {
  let html = `<div class="summary-grid">`;
  u.resumen.forEach(item => {
    html += `<div class="summary-card"><strong>${item.key}</strong><br>${item.val}</div>`;
  });
  html += `</div>`;
  panel.innerHTML = html;
}

function renderQuiz(panel, unitKey) {
  if (!quizState[unitKey]) initQuizState(unitKey);
  const state = quizState[unitKey];
  const qs = units[unitKey].quiz;

  const answered = state.answered.filter(a => a !== null).length;
  const correct  = state.answered.filter(a => a === 'correct').length;
  const pct = qs.length > 0 ? Math.round((answered / qs.length) * 100) : 0;

  let html = `
    <div class="quiz-intro">
      <span class="quiz-intro-icon">⚖️</span>
      <span>Seleccioná la opción correcta. Cada pregunta muestra retroalimentación inmediata.</span>
    </div>
    <div class="quiz-score-bar">
      <div class="score-pill">✔ ${correct} / ${qs.length}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span style="font-size:0.8rem;color:#7a6040">${answered} respondidas</span>
    </div>
  `;

  qs.forEach((q, qi) => {
    const ans = state.answered[qi]; // null | 'correct' | 'wrong'
    html += `<div class="question-block" id="qblock-${qi}">
      <div class="question-header">
        <span class="q-number">${qi + 1}</span>
        <span>${q.q}</span>
      </div>
      <div class="options-list">`;

    const letters = ['A', 'B', 'C', 'D'];
    q.opts.forEach((opt, oi) => {
      let cls = '';
      if (ans !== null) {
        if (oi === q.ans) cls = 'correct';
        else if (state.answered[qi] === 'wrong' && oi === state.selected[qi]) cls = 'wrong';
      }
      html += `<button class="option-btn ${cls}" ${ans !== null ? 'disabled' : ''}
        onclick="selectAnswer(${qi}, ${oi}, '${unitKey}')">
        <span class="option-letter">${letters[oi]}</span>
        <span>${opt}</span>
      </button>`;
    });

    html += `</div>`;
    if (ans !== null) {
      html += `<div class="feedback-box ${ans} show">
        ${ans === 'correct' ? '✔ ' : '✘ '} ${q.fb}
      </div>`;
    }
    html += `</div>`;
  });

  if (state.done) {
    const pctScore = Math.round((correct / qs.length) * 100);
    let msg = pctScore >= 90 ? "¡Excelente dominio de la unidad!" :
              pctScore >= 70 ? "Buen trabajo. Repasá los puntos que fallaste." :
              "Revisá la lectura antes de volver a intentar.";
    html += `<div class="quiz-result-panel">
      <div class="result-score">${pctScore}%</div>
      <div class="result-label">${correct} correctas de ${qs.length}</div>
      <div class="result-message">${msg}</div>
      <button class="retry-btn" onclick="retryQuiz('${unitKey}')">↺ Reintentar</button>
    </div>`;
  }

  panel.innerHTML = html;
}

// ============================================================
//  INTERACTIONS
// ============================================================
function selectAnswer(qi, selectedOpt, unitKey) {
  if (!quizState[unitKey]) initQuizState(unitKey);
  const state = quizState[unitKey];
  if (state.answered[qi] !== null) return;

  const q = units[unitKey].quiz[qi];
  const isCorrect = selectedOpt === q.ans;
  state.answered[qi] = isCorrect ? 'correct' : 'wrong';
  if (!state.selected) state.selected = [];
  state.selected[qi] = selectedOpt;

  const allAnswered = state.answered.every(a => a !== null);
  if (allAnswered) state.done = true;

  // Re-render quiz preserving scroll
  const panel = document.getElementById('contentPanel');
  const scrollY = panel.scrollTop;
  renderQuiz(panel, unitKey);
  panel.scrollTop = scrollY;
}

function retryQuiz(unitKey) {
  initQuizState(unitKey);
  renderQuiz(document.getElementById('contentPanel'), unitKey);
}

// Event listeners
document.querySelectorAll('.unit-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    currentUnit = tab.dataset.unit;
    currentMode = 'lectura';
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === 'lectura'));
    renderUnit(currentUnit, currentMode);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentMode = btn.dataset.mode;
    renderUnit(currentUnit, currentMode);
  });
});

// Initial render
renderUnit(currentUnit, currentMode);
</script>

  var currentExam = null;
  var LETTERS = ['A','B','C','D'];

  function shuffle(arr) { return arr.slice().sort(function(){ return Math.random()-0.5; }); }

  function openModal() {
    var ov = document.getElementById('exam-overlay');
    ov.style.display = 'flex';
  }
  function closeModal() {
    document.getElementById('exam-overlay').style.display = 'none';
  }
  function closeExamPanel() {
    document.getElementById('exam-panel').style.display = 'none';
    currentExam = null;
  }

  function startExam(n) {
    closeModal();
    currentExam = shuffle(Q).slice(0, n);
    var inner = document.getElementById('exam-panel-inner');
    var tiempos = {10:'~10 min', 25:'~25 min', 50:'~50 min'};
    var icons = {10:'🔥', 25:'⚡', 50:'🏆'};

    var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px;">'
      + '<div>'
      + '<h2 style="font-family:var(--display);color:var(--gold-light,#e8c87a);font-size:1.4rem;margin-bottom:4px;">'
      + icons[n]+' Desafío '+({10:1,25:2,50:3}[n])+' — '+n+' preguntas</h2>'
      + '<p style="color:#9ca3af;font-size:0.8rem;">Unidades VI–X · '+tiempos[n]+'</p>'
      + '</div>'
      + '<button id="ep-close" style="background:none;border:1px solid rgba(255,255,255,0.15);color:#9ca3af;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:0.8rem;">✕ Cerrar</button>'
      + '</div>'
      + '<div id="ep-result" style="display:none;margin-bottom:20px;padding:14px 18px;border-radius:10px;font-size:0.9rem;font-weight:600;border:1px solid;"></div>'
      + '<div style="display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;">'
      + '<button id="ep-grade" style="background:linear-gradient(135deg,#16a34a,#15803d);border:none;border-radius:999px;padding:9px 20px;color:#fff;cursor:pointer;font-weight:700;font-size:0.83rem;box-shadow:0 4px 14px rgba(22,163,74,0.4);">✅ Corregir examen</button>'
      + '<button id="ep-retry" style="background:linear-gradient(135deg,#b45309,#92400e);border:none;border-radius:999px;padding:9px 20px;color:#fff;cursor:pointer;font-weight:700;font-size:0.83rem;box-shadow:0 4px 14px rgba(180,83,9,0.4);">🔄 Nuevo examen</button>'
      + '</div>';

    currentExam.forEach(function(q, idx) {
      html += '<div class="ep-q" data-idx="'+idx+'" style="margin-bottom:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(212,168,67,0.12);border-radius:10px;padding:16px;">';
      html += '<p style="font-weight:600;margin-bottom:10px;line-height:1.5;font-size:0.9rem;color:#f0e6d3;"><span style="color:#ffffff;font-weight:700;">'+(idx+1)+'.</span> '+q.q+'</p>';
      html += '<div style="display:flex;flex-direction:column;gap:6px;">';
      q.o.forEach(function(opt, i) {
        html += '<label class="ep-opt" data-oi="'+i+'" style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:background 0.15s;color:#f0e6d3;">'
          + '<input type="radio" name="eq'+idx+'" data-qi="'+idx+'" data-oi="'+i+'" style="accent-color:var(--gold,#d4a843);cursor:pointer;"/>'
          + '<span style="font-size:0.85rem;"><strong style="color:#ffffff;font-weight:700;">'+LETTERS[i]+'.</strong> '+opt+'</span>'
          + '</label>';
      });
      html += '</div></div>';
    });

    inner.innerHTML = html;
    var panel = document.getElementById('exam-panel');
    panel.style.display = 'block';
    panel.scrollTop = 0;

    document.getElementById('ep-close').addEventListener('click', closeExamPanel);
    document.getElementById('ep-grade').addEventListener('click', gradeExam);
    document.getElementById('ep-retry').addEventListener('click', function() {
      closeExamPanel();
      openModal();
    });
  }

  function gradeExam() {
    if (!currentExam) return;
    var correct = 0, answered = 0;
    currentExam.forEach(function(q, idx) {
      var sel = document.querySelector('input[name="eq'+idx+'"]:checked');
      var opts = document.querySelectorAll('.ep-q[data-idx="'+idx+'"] .ep-opt');
      // marcar correcta verde
      opts[q.a].style.background = 'rgba(34,197,94,0.18)';
      opts[q.a].style.borderColor = 'rgba(34,197,94,0.5)';
      opts[q.a].querySelector('strong').style.color = '#4ade80';
      if (sel) {
        answered++;
        var oi = parseInt(sel.dataset.oi, 10);
        if (oi === q.a) { correct++; }
        else {
          opts[oi].style.background = 'rgba(239,68,68,0.18)';
          opts[oi].style.borderColor = 'rgba(239,68,68,0.5)';
          opts[oi].querySelector('strong').style.color = '#f87171';
        }
      }
      document.querySelectorAll('input[name="eq'+idx+'"]').forEach(function(inp){ inp.disabled=true; });
    });
    var pct = Math.round(correct/currentExam.length*100);
    var nota = pct>=90?'🏆 ¡Excelente!':pct>=70?'👍 Muy bien':pct>=50?'📚 Regular':'❌ A repasar';
    var res = document.getElementById('ep-result');
    res.style.display = 'block';
    res.innerHTML = nota+' &nbsp;·&nbsp; Correctas: <strong>'+correct+'/'+currentExam.length+'</strong> &nbsp;·&nbsp; Porcentaje: <strong>'+pct+'%</strong> &nbsp;·&nbsp; Respondidas: '+answered+'/'+currentExam.length;
    res.style.background = pct>=70?'rgba(34,197,94,0.1)':'rgba(239,68,68,0.1)';
    res.style.borderColor = pct>=70?'rgba(34,197,94,0.4)':'rgba(239,68,68,0.4)';
    res.style.color = '#f8fafc';
    document.getElementById('ep-grade').disabled = true;
    document.getElementById('ep-grade').style.opacity = '0.45';
    res.scrollIntoView({behavior:'smooth', block:'start'});
  }

  // ── LISTENERS ──────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('exam-mode-btn').addEventListener('click', openModal);
    document.getElementById('exam-modal-close').addEventListener('click', closeModal);
    document.getElementById('exam-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.querySelectorAll('.challenge-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        startExam(parseInt(this.dataset.n, 10));
      });
      btn.addEventListener('mouseenter', function() {
        this.style.background = 'linear-gradient(135deg,#2e1a04,#4a2808)';
        this.style.borderColor = 'rgba(212,168,67,0.6)';
      });
      btn.addEventListener('mouseleave', function() {
        this.style.background = 'linear-gradient(135deg,#1a0e02,#2e1a04)';
        this.style.borderColor = 'rgba(212,168,67,0.3)';
      });
    });
  });

})();
</script>
